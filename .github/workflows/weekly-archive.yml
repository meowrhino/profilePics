name: Weekly Telegram Profile Archive

on:
  schedule:
    - cron: '0 5 * * 0'    # domingo 05:00 UTC (~07:00 Madrid en invierno, 06:00 en horario de verano)
  workflow_dispatch:        # también se puede lanzar a mano desde "Actions"

jobs:
  archive-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # suficiente para que GITHUB_TOKEN haga push al propio repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Telethon session
        run: |
          if [ -z "${TELEGRAM_SESSION_B64:-}" ]; then
            echo "❌ TELEGRAM_SESSION_B64 no está configurado en Secrets"
            exit 1
          fi
          echo "$TELEGRAM_SESSION_B64" | base64 -d > telegram_profile_session.session
        env:
          TELEGRAM_SESSION_B64: ${{ secrets.TELEGRAM_SESSION_B64 }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "telethon>=1.34,<2" "pillow>=10,<12"

      - name: Run archiver
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          CI: 'true'
        run: |
          python profile_photos.py \
            --api-id "$API_ID" \
            --api-hash "$API_HASH" \
            --phone "$TELEGRAM_PHONE" \
            --out ./img

      - name: Quick listing for debug
        run: |
          echo "Last 20 files in img/"
          ls -lah img | tail -n 20 || true
          echo "manifest.json (first 40 lines if present)"
          test -f img/manifest.json && head -n 40 img/manifest.json || true

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Excluir el session file por si acaso (ya está en .gitignore pero por defensa en profundidad)
          rm -f telegram_profile_session.session

          git add -A img/

          if git diff --cached --quiet; then
            echo "ℹ️ No hay fotos nuevas esta semana — nada que commitear."
            exit 0
          fi

          git commit -m "Weekly archive: $(date -u +%F)"
          git pull --rebase origin main || true
          git push origin HEAD:main
