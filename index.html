<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Profile Pics Gallery (images + videos)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Agdasima", sans-serif;
      background-color: #1a1a1a;
      background-image:
        radial-gradient(ellipse at center, #1a1a1a 40%, transparent 70%),
        radial-gradient(circle, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 100% 100%, 22px 22px;
      overflow: hidden;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: #1a1a1a;
      color: #555;
      z-index: 10;
    }

    #loader span {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .gallery,
    #current-number,
    #arrow,
    #progress {
      visibility: hidden;
    }

    #current-number,
    #arrow {
      position: fixed;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 5em;
      font-weight: 700;
      color: #ffe600;
      pointer-events: none;
      text-shadow: 0 2px 24px rgba(255, 230, 0, 0.25);
    }

    #current-number {
      bottom: 10vh;
      transition: color 0.15s, text-shadow 0.15s;
    }

    #current-number.error {
      color: #ff3333;
      text-shadow: 0 2px 24px rgba(255, 50, 50, 0.4);
    }

    #arrow {
      top: 10vh;
      opacity: 0.5;
    }

    .gallery {
      position: fixed;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 100vw;
      height: 40vh;
      display: flex;
      gap: 10vw;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .tile {
      flex: 0 0 auto;
      width: 40vh;
      height: 40vh;
      overflow: hidden;
      background: #2a2a2a;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .tile:hover {
      transform: scale(1.04);
      box-shadow: 0 0 28px rgba(255, 230, 0, 0.15);
    }

    .tile img,
    .tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .galleryMargin {
      flex: 0 0 auto;
    }

    #progress {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #ffe600, #ffb300);
      width: 0;
      transition: width 0.1s linear;
      opacity: 0.7;
      z-index: 5;
    }

  </style>
</head>

<body>
  <div id="loader"><span>Cargando…</span></div>
  <div id="arrow">⬇</div>
  <div id="current-number">0</div>
  <div class="gallery"></div>
  <div id="progress"></div>

  <script src="js/text2num.js"></script><!-- optional: remove to disable text input -->
  <script src="js/gallery.js"></script>
</body>

</html>
